name: Deploy to HostGator via FTP

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22  # Mudei para 22 (projeto requer >=22.12.0)

      - name: Instalar dependências
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build do projeto
        run: npm run build

      - name: Detectar diretório de build
        run: |
          # Para TanStack Start, os arquivos estáticos ficam em dist/client
          if [ -d "dist/client" ]; then
            echo "BUILD_DIR=dist/client" >> $GITHUB_ENV
            echo "Usando dist/client (TanStack Start)"
          elif [ -d "dist" ]; then
            echo "BUILD_DIR=dist" >> $GITHUB_ENV
            echo "Usando dist (build padrão)"
          elif [ -d "out" ]; then
            echo "BUILD_DIR=out" >> $GITHUB_ENV
            echo "Usando out"
          else
            echo "ERRO: Nenhuma pasta de build encontrada"
            ls -la
            exit 1
          fi

      - name: Validar build
        run: |
          echo "Conteúdo da pasta $BUILD_DIR:"
          ls -la $BUILD_DIR/
          
          # Verifica se existe index.html
          if [ -f "$BUILD_DIR/index.html" ]; then
            echo "✅ index.html encontrado"
          else
            echo "❌ ERRO: index.html não encontrado em $BUILD_DIR"
            exit 1
          fi
          
          echo "Build válido: $BUILD_DIR"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ${{ env.BUILD_DIR }}/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.map
            **/server/**  # Exclui arquivos do backend (não necessários para site estático)
